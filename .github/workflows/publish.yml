name: publish-bracket-matrix

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Run pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        run: python -m bracket_matrix run-all --retention-days 365

      - name: Report scrape errors
        run: |
          python - <<'PY'
          import csv
          import os
          import sys

          path = "data/latest/source_status_latest.csv"
          with open(path, newline="", encoding="utf-8") as handle:
              rows = list(csv.DictReader(handle))

          summary_path = os.getenv("GITHUB_STEP_SUMMARY")

          def write_summary(lines: list[str]) -> None:
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as summary:
                  summary.write("\n".join(lines) + "\n")

          bad_rows = [
              row for row in rows
              if row.get("status", "").strip().lower() not in {"ok"}
          ]

          if not bad_rows:
              print("All sources scraped successfully.")
              write_summary([
                  "## Scrape status",
                  "✅ All sources scraped successfully.",
              ])
              sys.exit(0)

          print("Scrape errors detected (continuing publish):")
          summary_lines = [
              "## Scrape status",
              "⚠️ Scrape errors detected (publish continues):",
          ]
          for row in bad_rows:
              source_key = row.get("source_key", "")
              status = row.get("status", "")
              error_message = row.get("error_message", "")
              print(f"- {source_key}: {status} :: {error_message}")
              summary_lines.append(f"- `{source_key}`: `{status}` — {error_message}")

          total_sources = len(rows)
          failed_sources = len(bad_rows)
          if failed_sources == total_sources and total_sources > 0:
              print("All sources failed to scrape; failing workflow.")
              summary_lines.append("\n❌ All sources failed to scrape.")
              write_summary(summary_lines)
              sys.exit(1)

          write_summary(summary_lines)
          sys.exit(0)
          PY

      - name: Commit data snapshots and latest outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest data/snapshots || true
          if ! git diff --cached --quiet; then
            git commit -m "Update bracket matrix data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
